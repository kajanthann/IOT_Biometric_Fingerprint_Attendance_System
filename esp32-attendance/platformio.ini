[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200

lib_deps =
    adafruit/Adafruit SH110X @ ^2.1.14
    adafruit/Adafruit Fingerprint Sensor Library @ ^2.1.0
    knolleary/PubSubClient @ ^2.8.0
    bblanchon/ArduinoJson @ ^6.21.5